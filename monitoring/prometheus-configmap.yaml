apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config
  namespace: devops-pipeline

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "devops-app"

        metrics_path: /metrics

        static_configs:
          - targets:
              - "devops-service.devops-pipeline.svc.cluster.local:80"

